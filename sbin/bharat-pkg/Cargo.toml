[package]
name = "bharat-pkg"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "BharatOS package manager — delta updates, dependency resolution, sandboxed install"
[dependencies]
bhfs = { path = "../../fs/mount" }
bharat-libcrypto = { path = "../../libs/libcrypto" }
bharat-libcore = { path = "../../libs/libcore" }
clap = { version = "4.5", features = ["derive"] }
toml = { version = "0.8", default-features = false }
serde_json = { version = "1.0", default-features = false }
zip = { version = "0.6", default-features = false, features = ["deflate"] }
crossbeam = { version = "0.8", default-features = false }
thiserror = { version = "1.0", default-features = false }
[features]
default = ["verify-has"]
verify-has = []
delta-update = []
