[package]
name = "bharat-libsurface"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Cross-process GPU surface / paint API for BharatOS"
[dependencies]
bharat-libcore = { path = "../libcore" }
bitflags = { version = "2.5", default-features = false }
bytemuck = { version = "1.14", default-features = false }
raw-window-handle = { version = "0.6", default-features = false }
softbuffer = { version = "0.3", default-features = false }
lyon = { version = "1.0", default-features = false }
image = { version = "0.25", default-features = false }
[features]
default = ["software-swapchain"]
software-swapchain = []
vulkan = []
gles = []
