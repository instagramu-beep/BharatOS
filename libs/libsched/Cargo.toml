[package]
name = "bharat-libsched"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "BharatOS hybrid CFS+RT scheduler with NUMA affinity"
[dependencies]
bharat-libcore = { path = "../libcore" }
bharat-libhal = { path = "../libhal" }
bharat-libmm = { path = "../libmm" }
bitflags = { version = "2.5", default-features = false }
crossbeam = { version = "0.8", default-features = false }
lock_api = { version = "0.4", default-features = false }
heapless = { version = "0.7", default-features = false }
[features]
default = ["fx_handlers", "rt_prio"]
rt_prio = []
fx_handlers = []
